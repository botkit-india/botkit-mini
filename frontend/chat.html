<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BotKit India | Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="chat-page">
    <div class="glow-bg"></div>
    
    <div class="chat-layout fade-in">
        <aside class="sidebar glass-panel">
            <div class="logo small">
                <div class="logo-icon">🤖</div>
                <h2>BotKit</h2>
            </div>
            
            <div class="nav-links">
                <a href="/" class="nav-link">← Back to Setup</a>
            </div>

            <div class="system-status">
                <h3>System Status</h3>
                <div id="stats-container" class="stats-box">
                    <div class="stat-row">
                        <span>Documents</span>
                        <span id="stat-sources">...</span>
                    </div>
                    <div class="stat-row">
                        <span>Vectors</span>
                        <span id="stat-chunks">...</span>
                    </div>
                </div>
            </div>
        </aside>

        <main class="chat-container glass-panel">
            <div id="chat-history" class="chat-history">
                <div class="message system-msg">
                    <div class="avatar">🤖</div>
                    <div class="bubble">
                        <p>Hello! I'm BotKit. I can answer questions based on the websites you've crawled. What would you like to know?</p>
                    </div>
                </div>
                <!-- Messages will appear here -->
            </div>

            <div class="chat-input-area">
                <form id="chat-form">
                    <input type="text" id="chat-input" placeholder="Ask a question about your documents..." required autocomplete="off">
                    <button type="submit" id="send-btn" class="send-btn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </form>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/app.js"></script>
    <script>
        // Init chat page logic
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof initChat === 'function') initChat();
        });
    </script>
</body>
</html>
