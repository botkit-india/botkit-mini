<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="BotKit India — Paste a URL, get an AI chatbot for your website.">
  <title>BotKit India</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!--
    LAYOUT STATES (toggled by JS via class on #appLayout):
    1. Default (.state-centered)  — form card centered, results panel hidden
    2. Crawling (.state-crawling) — spinner shown inside form card
    3. Done (.state-split)        — form slides left, results panel slides in from right
  -->

  <div id="appLayout" class="app-layout state-centered">

    <!-- ========== LEFT / CENTER — URL Form Card ========== -->

    <div class="form-panel" id="formPanel">

      <div class="brand">
        <div class="brand-dot"></div>
        <span class="brand-name">BotKit India</span>
      </div>

      <h1 class="hero-headline">
        Your website,<br>
        now a <em>smart chatbot.</em>
      </h1>

      <p class="hero-sub">
        Paste a URL and we'll train an AI on your content.
      </p>

      <!-- URL FORM -->

      <div id="urlForm">

        <label class="form-label" for="website-url">
          Website URL
        </label>

        <input
          type="url"
          id="website-url"
          class="form-input"
          placeholder="https://yourwebsite.com"
          autocomplete="off"
        >

        <button
          id="create-btn"
          class="btn-primary"
          onclick="createChatbot()"
        >
          Create Chatbot
        </button>

      </div>

      <!-- ERROR SECTION -->

      <div id="error-section" class="hidden">
        <p id="error-text" class="error-msg"></p>
      </div>

      <!-- STATUS SECTION -->

      <div id="status-section" class="crawling-status hidden">

        <div class="spinner"></div>

        <div class="crawling-text">

          <span id="status-text">
            Crawling your website...
          </span>

          <small id="pages-count">
            Pages found: 0
          </small>

        </div>

      </div>

      <!-- PROGRESS BAR -->

      <div class="progress-bar-track hidden" id="progressTrack">
        <div class="progress-bar-fill" id="progressBar"></div>
      </div>

      <!-- SUCCESS SECTION -->

      <div id="success-section" class="hidden">

        <a
          href="chat.html"
          id="chatLink"
          class="btn-primary btn-chat"
          onclick="goToChat()"
        >
          Open Chat →
        </a>

      </div>

      <!-- FOOTER -->

      <div class="hero-footer">
        <span>🇮🇳</span>
        Made in India &nbsp;·&nbsp; No cloud &nbsp;·&nbsp; No code
      </div>

    </div>

    <!-- ========== RIGHT — CRAWLED RESULTS PANEL ========== -->

    <div class="results-panel hidden" id="resultsPanel">

      <div class="results-header">

        <div class="results-title-row">
          <span class="results-icon">✦</span>
          <h2 class="results-title">Crawl Complete</h2>
        </div>

        <div id="pagesBadge" class="pages-badge">
          0 pages
        </div>

      </div>

      <p class="results-sub">
        Here's what we found on your website:
      </p>

      <!-- PAGE CARDS -->

      <div id="pagesList" class="pages-list"></div>

    </div>

  </div>

  <script src="app.js"></script>

</body>

</html>
