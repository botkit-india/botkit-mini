<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BotKit India | Setup</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="glow-bg"></div>
    <div class="container fade-in">
        <header>
            <div class="logo">
                <div class="logo-icon">🤖</div>
                <h1>BotKit <span>India</span></h1>
            </div>
            <p class="subtitle">Paste a URL. Get a working chatbot in minutes.</p>
        </header>

        <main class="card glass-panel">
            <form id="crawl-form">
                <div class="input-group">
                    <label for="url-input">Target URL</label>
                    <input type="url" id="url-input" placeholder="https://example.com/documentation" required autocomplete="off">
                </div>
                
                <div class="options">
                    <label class="checkbox-container">
                        <input type="checkbox" id="force-crawl">
                        <span class="checkmark"></span>
                        Force recrawl (overwrite existing)
                    </label>
                </div>

                <button type="submit" id="crawl-btn" class="primary-btn">
                    <span class="btn-text">Crawl & Embed</span>
                    <div class="loader hidden"></div>
                </button>
            </form>

            <div id="status-message" class="status-message hidden">
                <!-- Status will appear here -->
            </div>
        </main>

        <div class="action-links">
            <a href="/chat" class="secondary-btn">Go to Chat →</a>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
